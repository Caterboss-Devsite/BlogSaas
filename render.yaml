services:
  - type: web
    name: blog-saas-web
    runtime: node
    repo: https://github.com/CaterbossIreland/BlogSaas
    plan: starter
    buildCommand: npm ci && npm run db:generate && npm run build
    startCommand: npm run db:push && npm run start:web
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: blog-saas-db
          property: connectionString
      - key: REDIS_URL
        fromDatabase:
          name: blog-saas-cache
          property: connectionString
      - key: SHOPIFY_API_KEY
        sync: false
      - key: SHOPIFY_API_SECRET
        sync: false
      - key: SHOPIFY_SCOPES
        value: read_content,write_content,read_products,read_themes
      - key: SHOPIFY_APP_URL
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_IMAGE_MODEL
        value: gemini-3.1-flash-image-preview

  - type: worker
    name: blog-saas-worker
    runtime: node
    repo: https://github.com/CaterbossIreland/BlogSaas
    plan: starter
    buildCommand: npm ci && npm run db:generate && npm run build
    startCommand: npm run db:push && npm run start:worker
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: blog-saas-db
          property: connectionString
      - key: REDIS_URL
        fromDatabase:
          name: blog-saas-cache
          property: connectionString
      - key: OPENAI_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_IMAGE_MODEL
        value: gemini-3.1-flash-image-preview

databases:
  - name: blog-saas-db
    plan: basic-256mb

  - name: blog-saas-cache
    plan: starter
    maxmemoryPolicy: allkeys-lru
